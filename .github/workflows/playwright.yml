name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'playwright-infra/package.json'
        
    - name: Install dependencies
      run: |
        cd playwright-infra
        npm install
        
    - name: Install Playwright Browsers
      run: |
        cd playwright-infra
        npx playwright install --with-deps
        
    - name: Debug Workspace files
      run: |
        pwd
        ls -la
        cd playwright-infra
        ls -la
        ls -R
        
    - name: Run Playwright tests
      run: |
        cd playwright-infra
        npx playwright test
        
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-infra/playwright-report/
        retention-days: 30
